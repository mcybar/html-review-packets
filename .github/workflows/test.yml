name: test

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
        working-directory: plugins/html-review-packets
      - run: npm run verify
        working-directory: plugins/html-review-packets

